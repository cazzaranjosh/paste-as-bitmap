<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; width: 220px; padding: 12px; margin: 0; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    a { font-size: 13px; color: #1a73e8; cursor: pointer; }
    .status { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="row">
    <input type="checkbox" id="enabled" />
    <label for="enabled">Enabled on this browser</label>
  </div>
  <div class="status" id="scope"></div>
  <a id="opts">Configure domains…</a>
  <script src="popup.js"></script>
</body>
</html>
