<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Paste As Bitmap — Options</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; max-width: 560px; margin: 24px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 18px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; }
    textarea { width: 100%; height: 120px; font-family: ui-monospace, monospace; font-size: 13px; padding: 8px; box-sizing: border-box; }
    .row { display: flex; align-items: center; gap: 8px; margin: 16px 0; }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    button { margin-top: 16px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
    #status { margin-left: 12px; color: #137333; }
  </style>
</head>
<body>
  <h1>Paste As Bitmap</h1>

  <div class="row">
    <input type="checkbox" id="enabled" />
    <label for="enabled" style="margin:0;">Enabled</label>
  </div>

  <label for="destinations">Destination domains</label>
  <textarea id="destinations" placeholder="one per line, e.g.&#10;notion.so&#10;app.example.com"></textarea>
  <div class="hint">
    The extension only rewrites pastes on these domains (subdomains included).
    Leave empty to act on every site. Source domains need no configuration.
  </div>

  <button id="save">Save</button>
  <span id="status"></span>

  <script src="options.js"></script>
</body>
</html>
